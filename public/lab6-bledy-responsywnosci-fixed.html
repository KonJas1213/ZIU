<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TodoApp – ćwiczenie Lab 6 (naprawione)</title>
<style>
:root {
  --font-h1: clamp(1.25rem, 3vw, 2rem);
  --font-h2: clamp(1rem, 2vw, 1.5rem);
  --font-body: clamp(0.875rem, 1.1vw, 1.125rem);
  --font-small: clamp(0.75rem, 0.85vw, 0.95rem);
}
body {
  margin: 0;
  font-family: Arial, sans-serif;
  font-size: var(--font-body);
  background: #f2f4f8;
  overflow-x: hidden;
}
h1 { font-size: var(--font-h1); }
h2 { font-size: var(--font-h2); }
.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: #0043ff;
  padding: 12px 16px;
}
.nav__logo { color: #fff; font-weight: bold; font-size: 1.125rem; }
.nav__hamburger {
  display: inline-flex;
  flex-direction: column;
  gap: 5px;
  min-width: 44px;
  min-height: 44px;
  padding: 10px;
  border: none;
  background: transparent;
  cursor: pointer;
}
.nav__hamburger span {
  display: block;
  width: 22px;
  height: 2px;
  background: #fff;
}
.nav__links {
  display: none;
  gap: 16px;
  list-style: none;
  margin: 0;
  padding: 0;
}
.nav__links a { color: #fff; text-decoration: none; }
.nav__links--open { display: flex; flex-direction: column; position: absolute; top: 56px; left: 0; right: 0; background: #0043ff; padding: 16px; }
@media (min-width: 768px) {
  .nav__hamburger { display: none; }
  .nav__links { display: flex; flex-direction: row; position: static; padding: 0; }
}
.container { max-width: 960px; margin: 0 auto; padding: clamp(1rem, 3vw, 1.5rem); }
.task-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: clamp(0.75rem, 2vw, 1rem);
  margin-top: 1.5rem;
}
@media (min-width: 768px) { .task-grid { grid-template-columns: repeat(2, 1fr); } }
@media (min-width: 1024px) { .task-grid { grid-template-columns: repeat(3, 1fr); } }
.task-card {
  background: #fff;
  border-radius: 8px;
  padding: 16px;
  box-shadow: 0 2px 6px rgba(0,0,0,.08);
}
.task-card__title { font-weight: bold; margin: 0 0 8px; }
.task-card__meta { font-size: var(--font-small); color: #888; }
.task-card__actions { display: flex; gap: 8px; margin-top: 12px; }
.btn-icon {
  min-width: 44px;
  min-height: 44px;
  background: #f8b914;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-size: 1rem;
  display: flex;
  align-items: center;
  justify-content: center;
}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav__logo">TodoApp</div>
  <button class="nav__hamburger" id="menuBtn" aria-label="Otwórz menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>
  <ul class="nav__links" id="menu">
    <li><a href="#">Zadania</a></li>
    <li><a href="#">Kategorie</a></li>
    <li><a href="#">Ustawienia</a></li>
    <li><a href="#">Profil</a></li>
  </ul>
</nav>
<div class="container">
  <h1>Moje zadania</h1>
  <h2>Na dziś</h2>
  <div class="task-grid">
    <div class="task-card">
      <p class="task-card__title">Zaprojektować onboarding</p>
      <p class="task-card__meta">Termin: 12.04.2026 · Priorytet: wysoki</p>
      <div class="task-card__actions">
        <button class="btn-icon" title="Edytuj">✏️</button>
        <button class="btn-icon" title="Usuń">🗑️</button>
        <button class="btn-icon" title="Ukończ">✔️</button>
      </div>
    </div>
    <div class="task-card">
      <p class="task-card__title">Code review – komponent Nav</p>
      <p class="task-card__meta">Termin: 13.04.2026 · Priorytet: średni</p>
      <div class="task-card__actions">
        <button class="btn-icon" title="Edytuj">✏️</button>
        <button class="btn-icon" title="Usuń">🗑️</button>
        <button class="btn-icon" title="Ukończ">✔️</button>
      </div>
    </div>
    <div class="task-card">
      <p class="task-card__title">Napisać testy jednostkowe</p>
      <p class="task-card__meta">Termin: 15.04.2026 · Priorytet: niski</p>
      <div class="task-card__actions">
        <button class="btn-icon" title="Edytuj">✏️</button>
        <button class="btn-icon" title="Usuń">🗑️</button>
        <button class="btn-icon" title="Ukończ">✔️</button>
      </div>
    </div>
  </div>
</div>
<script>
const btn = document.getElementById("menuBtn");
const menu = document.getElementById("menu");
btn.addEventListener("click", () => {
  const open = menu.classList.toggle("nav__links--open");
  btn.setAttribute("aria-expanded", String(open));
});
</script>
</body>
</html>
